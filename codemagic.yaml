workflows:
  android-workflow:
    name: FocusGuard Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        PACKAGE_NAME: "com.yourcompany.focusguard.agent"
    scripts:
      - name: Force regenerate clean Gradle wrapper
        script: |
          rm -rf gradle/wrapper
          rm -f gradlew gradlew.bat
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
      - name: Build Android APK (Debug)
        script: ./gradlew assembleDebug
    artifacts:
      - "**/*.apk"
    publishing:
      email:
        recipients:
          - your-email@example.com
