workflows:
  android-workflow:
    name: FocusGuard Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        PACKAGE_NAME: "com.yourcompany.focusguard.agent"
    scripts:
      - name: Generate Gradle wrapper if missing
        script: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew
      - name: Build Android APK (Debug)
        script: ./gradlew assembleDebug
    artifacts:
      - "**/*.apk"
    publishing:
      email:
        recipients:
          - your-email@example.com
