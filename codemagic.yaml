workflows:
  android-workflow:
    name: FocusGuard Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
      groups: []
      vars:
        PACKAGE_NAME: "com.yourcompany.focusguard.agent"
    scripts:
      - name: Build Android APK (Debug)
        script: |
          chmod +x gradlew || true
          ./gradlew assembleDebug
    artifacts:
      - "**/*.apk"
    publishing:
      email:
        recipients:
          - your-email@example.com
